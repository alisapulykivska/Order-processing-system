apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: orderflow
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: orderflow-order-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 20002
          envFrom:
            - configMapRef:
                name: kafka-config
          readinessProbe:
            tcpSocket:
              port: 20002
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 20002
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
